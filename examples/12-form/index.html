<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coup — Form Validation</title>
  <script type="importmap">
  {
    "imports": {
      "lit-html": "https://esm.sh/lit-html@3",
      "lit-html/": "https://esm.sh/lit-html@3/",
      "coup": "../../index.js"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    signup-form {
      width: 100%;
      max-width: 420px;
    }

    form {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 32px;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }

    /* Fields */
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #8b949e;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus {
      border-color: #58a6ff;
    }
    .field input:disabled {
      opacity: 0.5;
    }
    .field.invalid input {
      border-color: #f85149;
    }
    .field.invalid label {
      color: #f85149;
    }

    /* Error messages */
    .error-msg {
      font-size: 12px;
      color: #f85149;
      margin-top: 5px;
    }

    /* Password strength */
    .strength {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .strength-bar {
      display: flex;
      gap: 3px;
      flex: 1;
    }
    .strength-bar .segment {
      height: 4px;
      flex: 1;
      border-radius: 2px;
      background: #21262d;
      transition: background 0.2s;
    }
    .strength-label {
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* Alert */
    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .alert.error {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: #f85149;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .actions button[type="submit"] {
      flex: 1;
      padding: 10px 20px;
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .actions button[type="submit"]:hover:not(:disabled) {
      background: #2ea043;
    }
    .actions button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .actions .secondary {
      padding: 10px 16px;
      background: none;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 14px;
      cursor: pointer;
    }
    .actions .secondary:hover {
      border-color: #8b949e;
      color: #e6edf3;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hint */
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #484f58;
      text-align: center;
    }
    .hint code {
      background: #21262d;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 11px;
    }

    /* Success card */
    .success-card {
      background: #161b22;
      border: 1px solid #2ea043;
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
    }
    .success-icon {
      width: 56px; height: 56px;
      background: #238636;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      margin: 0 auto 16px;
    }
    .success-card h2 {
      margin-bottom: 8px;
    }
    .success-card p {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .success-card button {
      padding: 8px 20px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      cursor: pointer;
    }
    .success-card button:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }
  </style>
</head>
<body>
  <signup-form></signup-form>
  <script type="module" src="app.js"></script>
</body>
</html>
