<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coup — kanban board</title>
  <script type="importmap">
  {
    "imports": {
      "lit-html": "https://esm.sh/lit-html@3",
      "lit-html/": "https://esm.sh/lit-html@3/",
      "coup": "../../index.js"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 1rem; background: #1a1a2e; color: #eee; min-height: 100vh; }
    h1 { margin-bottom: 1rem; font-size: 1.3rem; color: #a0a0c0; }

    .board { display: flex; gap: 1rem; overflow-x: auto; }
    .column {
      background: #16213e; border-radius: 8px; padding: 0.75rem;
      min-width: 260px; flex: 1; max-width: 320px;
    }
    .column h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 0.75rem; }

    .card {
      background: #0f3460; border-radius: 6px; padding: 0.6rem 0.75rem;
      margin-bottom: 0.5rem; cursor: grab; position: relative;
      border-left: 3px solid #e94560;
      transition: opacity 0.15s, transform 0.15s;
    }
    .card:hover { background: #1a4a7a; }
    .card.dragging { opacity: 0.4; }
    .card .title { font-size: 0.9rem; margin-bottom: 0.3rem; }
    .card .meta { font-size: 0.7rem; color: #888; display: flex; justify-content: space-between; align-items: center; }
    .card .priority { font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 3px; }
    .card .priority.high { background: #e94560; color: white; }
    .card .priority.medium { background: #e9a045; color: #111; }
    .card .priority.low { background: #45e980; color: #111; }
    .card button {
      background: none; border: none; color: #666; cursor: pointer;
      font-size: 0.8rem; padding: 0.1rem 0.3rem; border-radius: 3px;
    }
    .card button:hover { background: #e94560; color: white; }

    .add-form { display: flex; gap: 0.3rem; margin-top: 0.5rem; }
    .add-form input {
      flex: 1; padding: 0.4rem; font-size: 0.8rem;
      background: #0a1929; border: 1px solid #333; border-radius: 4px; color: #eee;
    }
    .add-form button {
      padding: 0.4rem 0.6rem; font-size: 0.8rem; cursor: pointer;
      background: #e94560; color: white; border: none; border-radius: 4px;
    }

    .column.drag-over { background: #1a2d4e; }
    .drop-indicator {
      height: 3px; background: #e94560; border-radius: 2px;
      margin: 0.25rem 0; box-shadow: 0 0 6px #e9456080;
      animation: pulse-glow 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulse-glow {
      from { box-shadow: 0 0 4px #e9456060; }
      to   { box-shadow: 0 0 10px #e94560a0; }
    }
  </style>
</head>
<body>
  <h1>coup kanban</h1>
  <kanban-board></kanban-board>
  <script type="module" src="app.js"></script>
</body>
</html>
