<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coup — chat rooms</title>
  <script type="importmap">
  {
    "imports": {
      "lit-html": "https://esm.run/lit-html",
      "lit-html/": "https://esm.run/lit-html/",
      "coup": "../../index.js"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { font-family: system-ui, sans-serif; display: flex; }
    chat-app { display: flex; flex: 1; width: 100%; height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 220px; background: #2c2c3a; color: #ccc; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0;
    }
    .sidebar h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; }
    .room-btn {
      display: block; width: 100%; text-align: left; padding: 0.5rem 0.75rem;
      background: none; border: none; border-radius: 4px;
      color: #ccc; font-size: 0.9rem; cursor: pointer;
      text-decoration: none;
    }
    .room-btn:hover { background: #3a3a4e; }
    .room-btn.active { background: #e94560; color: white; }
    .user-label {
      margin-top: auto; padding: 0.5rem; font-size: 0.8rem;
      background: #3a3a4e; border-radius: 4px; text-align: center;
    }
    .user-label input {
      background: transparent; border: none; color: white; font-size: 0.8rem;
      text-align: center; width: 100%; outline: none;
    }

    /* Chat area */
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #1a1a2e; min-height: 0; }
    .chat-header { padding: 0.75rem 1rem; background: #16213e; border-bottom: 1px solid #333; color: #eee; font-weight: 600; flex-shrink: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; min-height: 0; }
    .msg { max-width: 70%; padding: 0.5rem 0.75rem; border-radius: 12px; font-size: 0.9rem; }
    .msg.mine { align-self: flex-end; background: #e94560; color: white; border-bottom-right-radius: 2px; }
    .msg.theirs { align-self: flex-start; background: #2c2c3a; color: #eee; border-bottom-left-radius: 2px; }
    .msg .author { font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.15rem; }
    .msg .text { word-break: break-word; }
    .msg .time { font-size: 0.6rem; opacity: 0.5; margin-top: 0.2rem; text-align: right; }
    .system-msg { text-align: center; font-size: 0.75rem; color: #666; padding: 0.3rem; }

    .compose {
      display: flex; gap: 0.5rem; padding: 0.75rem 1rem; background: #16213e;
      border-top: 1px solid #333;
    }
    .compose input {
      flex: 1; padding: 0.5rem 0.75rem; font-size: 0.9rem;
      background: #0a1929; border: 1px solid #333; border-radius: 20px; color: #eee;
      outline: none;
    }
    .compose input:focus { border-color: #e94560; }
    .compose button {
      padding: 0.5rem 1rem; background: #e94560; color: white;
      border: none; border-radius: 20px; cursor: pointer; font-size: 0.9rem;
    }
    .typing { font-size: 0.75rem; color: #666; padding: 0 1rem 0.5rem; }
  </style>
</head>
<body>
  <chat-app></chat-app>
  <script type="module" src="app.js"></script>
</body>
</html>
