<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Lightbox — coup example</title>
  <script type="importmap">
  {
    "imports": {
      "lit-html": "https://esm.sh/lit-html@3",
      "lit-html/": "https://esm.sh/lit-html@3/",
      "coup": "../../index.js"
    }
  }
  </script>
  <style>
    /* Page */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a; color: #eee;
      padding: 2rem 1.5rem; max-width: 900px; margin: 0 auto; line-height: 1.7;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.3rem; margin: 2.5rem 0 0.75rem; color: #ccc; }
    p { color: #999; margin-bottom: 1rem; }
    a { color: #58a6ff; }
    code { font-family: 'SF Mono', monospace; background: #161b22; padding: 0.15em 0.4em; border-radius: 3px; font-size: 0.9em; }
    .back { display: inline-block; margin-bottom: 1.5rem; font-size: 0.85rem; }

    /* Lightbox grid */
    media-lightbox { display: block; }
    .lb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }
    .lb-grid-item {
      position: relative; cursor: pointer; border-radius: 8px;
      overflow: hidden; aspect-ratio: 4/3;
    }
    .lb-grid-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.3s ease;
    }
    .lb-grid-item:hover img { transform: scale(1.05); }
    .lb-grid-play {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: white;
      background: rgba(0,0,0,0.3); pointer-events: none;
    }

    /* Overlay */
    .lb-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 10000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .lb-overlay.lb-open { opacity: 1; pointer-events: all; }

    /* Close button */
    .lb-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: white;
      font-size: 1.5rem; cursor: pointer; z-index: 10;
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .lb-close:hover { background: rgba(255,255,255,0.15); }

    /* Arrows */
    .lb-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1); border: none; color: white;
      font-size: 2rem; cursor: pointer;
      width: 3rem; height: 3rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .lb-arrow:hover { background: rgba(255,255,255,0.25); }
    .lb-arrow-left { left: 1rem; }
    .lb-arrow-right { right: 1rem; }

    /* Main media */
    .lb-main {
      max-width: 85vw; max-height: 75vh;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-main img, .lb-main video {
      max-width: 100%; max-height: 75vh;
      object-fit: contain; border-radius: 4px;
      animation: lb-fade-in 0.2s ease;
    }
    @keyframes lb-fade-in {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Caption */
    .lb-caption {
      position: absolute; bottom: 5.5rem;
      left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.85); font-size: 0.9rem;
      text-align: center; max-width: 80%;
    }

    /* Counter */
    .lb-counter {
      position: absolute; top: 1.2rem;
      left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 0.8rem; font-weight: 500;
    }

    /* Thumbnail strip */
    .lb-thumbs {
      position: absolute; bottom: 1rem;
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.4rem;
      max-width: 90vw; overflow-x: auto; padding: 0.3rem;
    }
    .lb-thumb {
      width: 3.5rem; height: 2.5rem; border-radius: 4px;
      overflow: hidden; cursor: pointer; opacity: 0.5;
      transition: opacity 0.2s; flex-shrink: 0;
      border: 2px solid transparent;
    }
    .lb-thumb.active { opacity: 1; border-color: white; }
    .lb-thumb:hover { opacity: 0.85; }
    .lb-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* Hide raw children before component renders */
    media-lightbox > img,
    media-lightbox > video {
      display: none;
    }

    /* Single image mode */
    .single-demo media-lightbox .lb-grid {
      max-width: 400px;
    }
    .single-demo media-lightbox .lb-grid-item {
      aspect-ratio: 3/2;
    }
  </style>
</head>
<body>
  <h1>Media Lightbox</h1>
  <p>Click any image to open the lightbox. Use <code>←</code> <code>→</code> arrow keys to navigate, <code>Esc</code> to close.</p>

  <h2>Gallery</h2>
  <media-lightbox>
    <img src="https://picsum.photos/id/1015/1200/800" alt="River winding through a valley">
    <img src="https://picsum.photos/id/1016/1200/800" alt="Mountain lake reflections">
    <img src="https://picsum.photos/id/1018/1200/800" alt="Misty mountain ridges">
    <img src="https://picsum.photos/id/1019/1200/800" alt="Canyon waterfall">
    <video src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" poster="https://picsum.photos/id/1033/1200/800" data-caption="Flower blooming — sample video"></video>
    <img src="https://picsum.photos/id/1025/1200/800" alt="Pug close-up">
    <img src="https://picsum.photos/id/1035/1200/800" alt="Autumn forest path">
  </media-lightbox>

  <div class="single-demo">
    <h2>Single Image</h2>
    <p>Works with just one image too — click to enlarge. No arrows, no counter, no thumbnails.</p>
    <media-lightbox>
      <img src="https://picsum.photos/id/1040/1200/800" alt="Rolling hills at sunset">
    </media-lightbox>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
