<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coup — Movie Search</title>
  <script type="importmap">
  {
    "imports": {
      "lit-html": "https://esm.sh/lit-html@3",
      "lit-html/": "https://esm.sh/lit-html@3/",
      "coup": "../../index.js",
      "coup/": "../../"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #0d0d0d; color: #e6edf3; min-height: 100vh;
    }

    /* Header */
    .app-header {
      text-align: center; padding: 32px 16px 20px;
      background: linear-gradient(180deg, #1a1a2e 0%, #0d0d0d 100%);
    }
    .app-header h1 { font-size: 28px; letter-spacing: -0.5px; }
    .app-header h1 span { color: #e50914; }
    .app-header p { color: #8b949e; font-size: 13px; margin-top: 6px; }

    movie-search { display: block; max-width: 960px; margin: 0 auto; padding: 0 16px 60px; }

    /* Search bar */
    .search-bar {
      display: flex; gap: 10px; margin-bottom: 20px;
      position: sticky; top: 0; z-index: 10;
      background: #0d0d0d; padding: 12px 0;
    }
    .search-bar input {
      flex: 1; padding: 12px 16px; font-size: 15px;
      background: #161b22; color: #e6edf3; border: 1px solid #30363d;
      border-radius: 8px; outline: none; transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: #e50914; }
    .search-bar input::placeholder { color: #484f58; }

    /* Toolbar: rows per page + clear cache */
    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; font-size: 13px; color: #8b949e;
    }
    .toolbar select {
      background: #161b22; color: #e6edf3; border: 1px solid #30363d;
      border-radius: 6px; padding: 4px 8px; font-size: 13px; cursor: pointer;
    }
    .toolbar button {
      background: none; border: 1px solid #30363d; color: #8b949e;
      border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .toolbar button:hover { color: #e6edf3; border-color: #8b949e; }

    /* Results count + cached badge */
    .results-info { margin-bottom: 16px; font-size: 14px; color: #8b949e; }
    .cached-badge {
      display: inline-block; background: #1a3a1a; color: #3fb950;
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      margin-left: 6px; font-weight: 600;
    }

    /* Movie grid */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }
    .movie-card {
      background: #161b22; border-radius: 8px; overflow: hidden;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      border: 1px solid #21262d;
    }
    .movie-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      border-color: #e50914;
    }
    .movie-card img {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      background: #21262d; display: block;
    }
    .movie-card .card-info { padding: 10px 12px; }
    .movie-card .card-title {
      font-size: 13px; font-weight: 600; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .movie-card .card-meta {
      font-size: 11px; color: #8b949e; margin-top: 4px;
      display: flex; justify-content: space-between;
    }
    .movie-card .card-type {
      text-transform: capitalize; background: #21262d;
      padding: 1px 6px; border-radius: 4px; font-size: 10px;
    }

    /* Detail view */
    .detail {
      display: flex; gap: 24px; background: #161b22;
      border: 1px solid #21262d; border-radius: 12px; padding: 24px;
    }
    .detail img {
      width: 220px; border-radius: 8px; flex-shrink: 0;
      object-fit: cover; background: #21262d;
    }
    .detail-info { flex: 1; min-width: 0; }
    .detail-info h2 { font-size: 22px; margin-bottom: 4px; }
    .detail-info .detail-meta { color: #8b949e; font-size: 14px; margin-bottom: 16px; }
    .detail-info .detail-row { margin-bottom: 10px; font-size: 14px; line-height: 1.5; }
    .detail-info .detail-label { color: #8b949e; font-weight: 600; }
    .detail-info .ratings { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .detail-info .rating-badge {
      background: #21262d; padding: 6px 12px; border-radius: 6px;
      font-size: 12px; text-align: center;
    }
    .detail-info .rating-source { color: #8b949e; font-size: 10px; display: block; margin-top: 2px; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: 1px solid #30363d; color: #e6edf3;
      border-radius: 8px; padding: 8px 16px; font-size: 14px;
      cursor: pointer; margin-bottom: 20px; transition: border-color 0.2s;
    }
    .back-btn:hover { border-color: #e50914; }

    /* Pagination */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 8px; margin-top: 24px;
    }
    .pagination button {
      background: #161b22; border: 1px solid #30363d; color: #e6edf3;
      border-radius: 6px; padding: 8px 16px; font-size: 13px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .pagination button:hover:not(:disabled) { border-color: #e50914; background: #1a1a2e; }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
    .pagination button.active { background: #e50914; border-color: #e50914; }
    .pagination .page-info { color: #8b949e; font-size: 13px; min-width: 80px; text-align: center; }

    /* Spinner */
    .spinner { display: flex; justify-content: center; padding: 48px; }
    .spinner::after {
      content: ''; width: 32px; height: 32px;
      border: 3px solid #30363d; border-top-color: #e50914;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-msg {
      text-align: center; padding: 20px; margin: 20px 0;
      background: #3d1f1f; border: 1px solid #f85149; border-radius: 8px;
      font-size: 14px; color: #f85149;
    }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px; color: #484f58;
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* Mobile */
    @media (max-width: 600px) {
      .app-header h1 { font-size: 20px; }
      .movie-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
      .detail { flex-direction: column; padding: 16px; }
      .detail img { width: 100%; max-width: 240px; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <div class="app-header">
    <h1>🎬 <span>Movie Search</span></h1>
    <p>QueryClient demo — caching, prefetching, abort, pagination</p>
  </div>
  <movie-search></movie-search>
  <script type="module" src="app.js"></script>
</body>
</html>
