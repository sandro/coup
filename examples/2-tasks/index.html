<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coup — task list example</title>
  <script type="importmap">
  {
    "imports": {
      "lit-html": "https://esm.sh/lit-html@3",
      "lit-html/": "https://esm.sh/lit-html@3/",
      "coup": "../../index.js"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1rem; }
    .task-form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .task-form input { flex: 1; padding: 0.5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .task-form button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
    .task-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; border: 1px solid #eee;
      border-radius: 4px; margin-bottom: 0.25rem; background: #fafafa; }
    .task-item.done .task-name { text-decoration: line-through; color: #999; }
    .task-name { flex: 1; }
    .task-id { font-size: 0.7rem; color: #aaa; font-family: monospace; }
    button { cursor: pointer; }
    .controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .controls button { padding: 0.25rem 0.75rem; font-size: 0.9rem; }
    .status-bar { margin-top: 1rem; padding: 0.5rem; background: #e8f5e9; border-radius: 4px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>coup task list</h1>
  <task-app></task-app>
  <script type="module" src="app.js"></script>
</body>
</html>
